# https://github.com/CptPotato/helix-themes
theme = "kanabox_default"

[editor]
line-number = "relative"
mouse = false
cursorline = true
# cursorcolumn = true
# Necessary to have true-color support over ssh
true-color = true
end-of-line-diagnostics = "hint"

[editor.soft-wrap]
enable = true

[editor.inline-diagnostics]
cursor-line = "warning" # show warnings and errors on the cursorline inline

[editor.statusline]
right = [
    "diagnostics",
    "version-control",
    "selections",
    "position",
    "file-encoding",
]

[editor.lsp]
display-inlay-hints = true

[keys.normal]
esc = ["collapse_selection", "keep_primary_selection"]
# C-u = ["half_page_up", "align_view_center"]
# C-d = ["half_page_down", "align_view_center"]
# C-b = ["page_up", "align_view_center"]
# C-f = ["page_down", "align_view_center"]
C-j = ["extend_to_line_bounds", "delete_selection", "paste_after"]
C-k = [
    "extend_to_line_bounds",
    "delete_selection",
    "move_line_up",
    "paste_before",
]
")" = { d = "goto_prev_diag", D = "goto_first_diag", f = "goto_prev_function", t = "goto_prev_class", a = "goto_prev_parameter", c = "goto_prev_comment", T = "goto_prev_test", p = "goto_prev_paragraph", g = "goto_prev_change", G = "goto_first_change" }
"=" = { d = "goto_next_diag", D = "goto_last_diag", f = "goto_next_function", t = "goto_next_class", a = "goto_next_parameter", c = "goto_next_comment", T = "goto_next_test", p = "goto_next_paragraph", g = "goto_next_change", G = "goto_last_change" }
A-h = ["select_prev_sibling"]
A-l = ["select_next_sibling"]
A-k = ["expand_selection"]
A-j = ["shrink_selection"]

[editor.cursor-shape]
insert = "bar"
select = "underline"

[editor.file-picker]
hidden = false

[editor.indent-guides]
render = true

[keys.normal.backspace]
ret = ":run-shell-command zellij run -fc -- broot"
C-ret = ":run-shell-command zellij run -fc -- xplr"
space = ":run-shell-command zellij run -fc -- lazygit"
C-space = ":run-shell-command zellij run -fc -- serie"
