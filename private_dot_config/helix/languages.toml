[[language]]
name = "rust"
auto-format = true
language-servers = ["rust-analyzer", "typos"]

[language-server.rust-analyzer.config.check]
command = "clippy"

[[language]]
name = "python"
language-servers = ["basedpyright", "ruff", "typos"]
auto-format = false
[language-server.ruff]
command = "ruff"
args = ["server"]
[language-server.basedpyright.config.basedpyright.analysis]
typeCheckingMode = "basic"

[language-server.typos]
command = "typos-lsp"
config.diagnosticSeverity = "Hint"

[[language]]
name = "c"
language-servers = ["clangd", "typos"]

[[language]]
name = "cpp"
language-servers = ["clangd", "typos"]

[[language]]
name = "markdown"
language-servers = ["marksman", "typos"]

[[language]]
name = "toml"
formatter = { command = "taplo", args = ["fmt", "-"] }
language-servers = ["taplo", "typos"]

[language-server]
jdtls = { command = "jdtls" }
language-server = { command = "jdtls", args = [
  "-data", "/home/melchiore/.cache/jdtls/workspace" ]}

# [language-server.jdtls.config.java.inlayHints]
# parameterNames.enabled = "all"

[[language]]
name = "java"
scope = "source.java"
injection-regex = "java"
file-types = ["java"]
roots = ["pom.xml", "build.gradle", ]
indent = { tab-width = 4, unit = "    " }
language-servers = [ "jdtls", "typos" ]
